# Kiến trúc: Stack Docker lesson: feed caching with redis.
# (EN: Docker stack for lesson: feed caching with redis.)
#
# Demo: HTTP API cổng 3000 (hoặc theo compose); xem README module.
#
# Thư mục làm việc: 1-feed-caching-with-redis/.docker
# (EN: Working directory: 1-feed-caching-with-redis/.docker)
#
# Khởi chạy stack:
# (EN: Start stack:)
#   cd 1-feed-caching-with-redis/.docker && docker compose up -d --build
#
# Xem log:
# (EN: View logs:)
#   docker compose logs -f
#
# Dọn dẹp:
# (EN: Cleanup:)
#   docker compose down -v
#
name: 1-feed-caching-with-redis

services:
  # NestJS API Service
  # NestJS HTTP API — entry lesson.
  # (EN: NestJS HTTP API — lesson entrypoint.)
  # NestJS HTTP API.
  # (EN: NestJS HTTP API.)
  api:
    container_name: 1-feed-caching-with-redis-api
    image: starciacademy/feed-caching-with-redis-feed-cache-service:latest
    ports:
      # Ánh xạ cổng host 3000 -> container 3000 (HTTP API).
      # (EN: Map host port 3000 -> container 3000 (HTTP API).)
      # Cổng HTTP API host → container.
      # (EN: HTTP API host → container port.)
      - "3000:3000"
    environment:
      - PORT=3000
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=feed_cache_service
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - 1-feed-caching-with-redis-network
    depends_on:
      - db
      - redis

  # Postgres Database
  # PostgreSQL — persistence lesson.
  # (EN: PostgreSQL — lesson persistence.)
  # PostgreSQL persistence.
  # (EN: PostgreSQL persistence.)
  db:
    image: postgres:16-alpine
    container_name: 1-feed-caching-with-redis-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=feed_cache_service
    ports:
      - "5432:5432"
    networks:
      - 1-feed-caching-with-redis-network

  # Redis cache for Sorted Set timelines
  # Redis — cache / queue / rate limit.
  # (EN: Redis — cache / queue / rate limit.)
  # Redis cache/queue/rate-limit.
  # (EN: Redis cache/queue/rate-limit.)
  redis:
    image: redis:7-alpine
    container_name: 1-feed-caching-with-redis-redis
    ports:
      - "6379:6379"
    networks:
      - 1-feed-caching-with-redis-network

networks:
  1-feed-caching-with-redis-network:
    name: 1-feed-caching-with-redis-network
