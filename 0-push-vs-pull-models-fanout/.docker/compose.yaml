# Kiến trúc: Stack Docker lesson: push vs pull models fanout.
# (EN: Docker stack for lesson: push vs pull models fanout.)
#
# Demo: HTTP API cổng 3000 (hoặc theo compose); xem README module.
#
# Thư mục làm việc: 0-push-vs-pull-models-fanout/.docker
# (EN: Working directory: 0-push-vs-pull-models-fanout/.docker)
#
# Khởi chạy stack:
# (EN: Start stack:)
#   cd 0-push-vs-pull-models-fanout/.docker && docker compose up -d --build
#
# Xem log:
# (EN: View logs:)
#   docker compose logs -f
#
# Dọn dẹp:
# (EN: Cleanup:)
#   docker compose down -v
#
name: 0-push-vs-pull-models-fanout

services:
  # NestJS API Service
  # NestJS HTTP API — entry lesson.
  # (EN: NestJS HTTP API — lesson entrypoint.)
  # NestJS HTTP API.
  # (EN: NestJS HTTP API.)
  api:
    container_name: 0-push-vs-pull-models-fanout-api
    image: starciacademy/system-design-push-vs-pull-models-fanout-feed-service:latest
    ports:
      # Cổng HTTP API host → container.
      # (EN: HTTP API host → container port.)
      - "3013:3000"
    environment:
      - PORT=3000
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=feed_service
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - 0-push-vs-pull-models-fanout-network
    depends_on:
      - db
      - redis

  # Postgres Database
  # PostgreSQL — persistence lesson.
  # (EN: PostgreSQL — lesson persistence.)
  # PostgreSQL persistence.
  # (EN: PostgreSQL persistence.)
  db:
    image: postgres:16-alpine
    container_name: 0-push-vs-pull-models-fanout-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=feed_service
    volumes:
      # Mount seed SQL để khởi tạo dữ liệu demo khi DB lần đầu chạy.
      # (EN: Mount seed SQL to initialise demo data on first DB start.)
      - ../.sql/seed.sql:/docker-entrypoint-initdb.d/seed.sql:ro
    networks:
      - 0-push-vs-pull-models-fanout-network

  # Redis cache for optional fanout experiments
  # Redis — cache / queue / rate limit.
  # (EN: Redis — cache / queue / rate limit.)
  # Redis cache/queue/rate-limit.
  # (EN: Redis cache/queue/rate-limit.)
  redis:
    image: redis:7-alpine
    container_name: 0-push-vs-pull-models-fanout-redis
    networks:
      - 0-push-vs-pull-models-fanout-network

networks:
  0-push-vs-pull-models-fanout-network:
    name: 0-push-vs-pull-models-fanout-network
